<div class="content-margin">
    <h1>Add Task</h1>
    <form onsubmit="return false; addTask()">
        <div class="task-form">
            <div class="column-left">
                <div class="form-item">
                    <label for="title">Title</label>
                    <input id="title" class="form-element" type="text" placeholder="Enter a title">
                    <span class="validation-note">This field is required</span>
                </div>
                <div class="form-item">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-element" cols="60" rows="3"
                        placeholder="Enter a description"></textarea>
                    <span class="validation-note">This field is required</span>
                </div>
                <div class="form-item">
                    <label for="category">Category</label>
                    <div class="dropdown" onclick="toggleDropdown('category')">
                        <button id="category" class="form-element dropdown-button">
                            <span>Select task category</span>
                            <img src="assets/img/dropdow-arrow.png">
                            <div id="category-options" class="dropdown-content collapse">
                                <div>New category</div>
                                <div>Sales <img src="assets/img/purple-circle.png"></div>
                                <div>Backoffice <img src="assets/img/turquoise-circle.png"></div>
                            </div>
                        </button>
                    </div>
                    <span class="validation-note">This field is required</span>
                </div>
                <div class="form-item">
                    <label for="assignment">Assign to</label>
                    <div class="dropdown" onclick="toggleDropdown('assignment')">
                        <button id="assignment" class="form-element dropdown-button">
                            <span>Select contacts to assign</span>
                            <img src="assets/img/dropdow-arrow.png">
                            <div id="assignment-options" class="dropdown-content collapse">
                                <div>
                                    You
                                </div>
                                <div>
                                    Maximilian Vogel
                                </div>
                                <div>
                                    Invite new contact
                                    <img src="assets/img/contacts-icon-black.png">
                                </div>
                            </div>
                        </button>
                    </div>
                    <span class="validation-note">This field is required</span>
                </div>
            </div>
            <div class="column-right">
                <div>
                    <div class="form-item">
                        <span>Due date</span>
                        <input id="date" class="date-input" type="date">
                        <span class="validation-note ">This field is required</span>
                    </div>
                    <div class="form-item">
                        <span>Prio</span>
                        <div id="prio" class="prio">
                            <button id="urgent-button" class="prio-button" type="button" onclick="choosePrio('urgent')" value="urgent">
                                Urgent
                                <img src="assets/img/default-urgent.png">
                            </button>
                            <button id="medium-button" class="prio-button" type="button" onclick="choosePrio('medium')" value="medium">
                                Medium
                                <img src="assets/img/default-medium.png">
                            </button>
                            <button id="low-button" class="prio-button" type="button" onclick="choosePrio('low')" value="low">
                                Low
                                <img src="assets/img/default-low.png">
                            </button>
                        </div>
                        <span class="validation-note ">Priority selection is mandatory</span>
                    </div>
                    <div class="form-item">
                        <span>Subtasks</span>
                        <input id="subtask" class="form-element" type="text" placeholder="Add new subtask">
                    </div>
                </div>
                <div class="form-buttons">
                    <button id="clear-button" class="clear-button" type="reset"
                        onmouseenter="changeImageOnHover('clear-button', 'assets/img/hover-cross.png')"
                        onmouseleave="changeImageOnHover('clear-button', 'assets/img/default-cross.png')">
                        Clear
                        <img src="assets/img/default-cross.png">
                    </button>
                    <button class="create-button" type="submit">Create Task
                        <img id="create-button" src="assets/img/check-icon.png">
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>
