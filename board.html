<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Board</title>
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/desktop_template.css">
    <link rel="stylesheet" href="style/mobile_template.css">
    <link rel="stylesheet" href="style/board.css">
    <link rel="stylesheet" href="style/fonts.css">
    <link rel="stylesheet" href="style/task_form_template.css">
    <script src="js/script.js"></script>
    <script src="js/task_form.js"></script>
    <script src="js/clear_and_validate_form.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/board.js"></script>
</head>

<body onload="initBoard()">
    <div w3-include-html="assets/templates/desktop_template.html"></div>
    <div w3-include-html="assets/templates/mobile_template.html"></div>
    <div class="content-margin">
        <header>
            <h1>Board</h1>
            <div class="header-buttons">
                <div class="search-bar">
                    <input id="search-field" type="text" placeholder="Find task" oninput="findTask()">
                    <img src="assets/img/vertical-line.png">
                    <img src="assets/img/search-icon.png">
                </div>
                <div class="add-task-button" onclick="showTaskForm()">
                    <span>Add task</span>
                    <img src="assets/img/plus-icon-white.png">
                </div>
            </div>
        </header>
        <div class="board">
            <div class="column">
                <div class="head">
                    To do
                    <img id="add-to-do" onclick="showTaskForm()"
                        onmouseenter="changeImageOnHover('add-to-do', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-to-do', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
                <div id="to-do-list" class="task-list" ondrop="moveTo('to do')" ondragover="allowDrop(event); toggleClass('to-do-list', 'heighlighted-dragged-area')"></div>
            </div>
            <div class="column">
                <div class="head">
                    In progress
                    <img id="add-in-progress" onclick="showTaskForm()"
                        onmouseenter="changeImageOnHover('add-in-progress', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-in-progress', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
                <div id="in-progress-list" class="task-list" ondrop="moveTo('in progress')" ondragover="allowDrop(event); toggleClass('in-progress-list', 'heighlighted-dragged-area')"></div>
            </div>
            <div class="column">
                <div class="head">
                    Awaiting feedback
                    <img id="add-awaiting-feedback" onclick="showTaskForm()"
                        onmouseenter="changeImageOnHover('add-awaiting-feedback', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-awaiting-feedback', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
                <div id="awaiting-feedback-list" class="task-list" ondrop="moveTo('awaiting feedback')" ondragover="allowDrop(event); toggleClass('awaiting-feedback-list', 'heighlighted-dragged-area')"></div>
            </div>
            <div class="column">
                <div class="head">
                    Done
                    <img id="add-done" onclick="showTaskForm()"
                        onmouseenter="changeImageOnHover('add-done', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-done', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
                <div id="done-list" class="task-list" ondrop="moveTo('done')" ondragover="allowDrop(event); toggleClass('done-list', 'heighlighted-dragged-area')"></div>
            </div>
        </div>
        <div id="detailed-task-box" class="hide"></div>
    </div>
    </div>
</body>

</html>
