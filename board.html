<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Board</title>
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/desktop_template.css">
    <link rel="stylesheet" href="style/mobile_template.css">
    <link rel="stylesheet" href="style/board.css">
    <link rel="stylesheet" href="style/fonts.css">
    <script src="js/script.js"></script>
    <script src="js/task_form.js"></script>
    <script src="js/clear_and_validate_form.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/board.js"></script>
</head>

<body onload="initBoard()">
    <div w3-include-html="assets/templates/desktop_template.html"></div>
    <div w3-include-html="assets/templates/mobile_template.html"></div>
    <div class="content-margin">
        <header>
            <h1>Board</h1>
            <div class="header-buttons">
                <div class="search-bar">
                    <input type="text" placeholder="Find task">
                    <img src="assets/img/vertical-line.png">
                    <img src="assets/img/search-icon.png">
                </div>
                <div class="add-task-button">
                    <span>Add task</span>
                    <img src="assets/img/plus-icon-white.png">
                </div>
            </div>
        </header>
        <div class="board">
            <div class="column">
                <div class="head">
                    To do
                    <img id="add-to-do" onmouseenter="changeImageOnHover('add-to-do', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-to-do', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
                <div id="to-do-list" class="task-list"></div>
            </div>
            <div class="column">
                <div class="head">
                    In progress
                    <img id="add-in-progress"
                        onmouseenter="changeImageOnHover('add-in-progress', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-in-progress', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
            </div>
            <div class="column">
                <div class="head">
                    Awaiting feedback
                    <img id="add-awaiting-feedback"
                        onmouseenter="changeImageOnHover('add-awaiting-feedback', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-awaiting-feedback', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
            </div>
            <div class="column">
                <div class="head">
                    Done
                    <img id="add-done" onmouseenter="changeImageOnHover('add-done', 'assets/img/hover-plus.png')"
                        onmouseleave="changeImageOnHover('add-done', 'assets/img/plus-button.png')"
                        src="assets/img/plus-button.png">
                </div>
            </div>
        </div>
        <div class="detailed-task hide">
            <div class="detailed-task-content">
                <h3>Design</h3>
                <h2>Call potential clients</h2>
                <h5>Make the product presentation to prespective buyers</h5>
                <span>
                    <h4>Due date:</h4>
                    <h5>05-08-2023</h5>
                </span>
                <span>
                    <h4>Priority:</h4>
                    <img src="assets/img/detailed-urgent.png">
                </span>
                <h4>Assigned to:</h4>
                <span>
                    <p style="background-color: #9327FF;">DE</p>
                    <h5>David Eisenberg</h5>
                </span>
                <span>
                    <p style="background-color: #FFA800;">BZ</p>
                    <h5>Benedikt Ziegler</h5>
                </span>
                <span>
                    <p style="background-color: #0223CF;">MB</p>
                    <h5>Marcel Bauer</h5>
                </span>
                <span>
                    <p style="background-color: #CB02CF;">SF</p>
                    <h5>Stefanie Farber</h5>
                </span>
            </div>
            <div class="detailed-task-buttons">
                <img class="close-button" onclick="toggleClass()" src="assets/img/default-cross.png">
                <div class="modify-buttons">
                    <div class="delete-button"
                        onmouseenter="changeImageOnHover('delete-button', 'assets/img/hover-delete.png')"
                        onmouseleave="changeImageOnHover('delete-button', 'assets/img/delete-icon.png')">
                        <img id="delete-button" src="assets/img/delete-icon.png">
                    </div>
                    <div class="edit-button">
                        <img src="assets/img/edit-icon.png">
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
